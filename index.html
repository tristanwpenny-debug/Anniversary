<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Joane ❤️</title>
    <style>
        :root {
            --accent: #ff4d6d;
            --bg-dark: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 3rem;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 85%;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ff4d6d, #ff8fa3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        /* Modern Pulsing Button */
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7);
            animation: pulse 2s infinite;
        }

        .btn:hover {
            transform: scale(1.1);
            background: #ff758c;
            animation: none;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 77, 109, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }

        /* Heart Particles */
        .heart-particle {
            position: absolute;
            pointer-events: none;
            animation: fly 3s ease-out forwards;
        }

        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-500px) translateX(var(--x)) rotate(var(--r)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Joane</h1>
        <p>Happy one-month anniversary! 🤍<br>Every day with you is my favorite day.</p>
        <button class="btn" onclick="celebrate()">Click for a Surprise</button>
    </div>

    <script>
        function celebrate() {
            for(let i=0; i<20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = '❤️';
                heart.style.left = '50%';
                heart.style.top = '50%';
                heart.style.setProperty('--x', (Math.random() * 400 - 200) + 'px');
                heart.style.setProperty('--r', (Math.random() * 360) + 'deg');
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                document.body.appendChild(heart);
                
                setTimeout(() => heart.remove(), 3000);
            }
        }
    </script>

</body>
</html>
